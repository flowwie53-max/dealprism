<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealPrism 🔫</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a, #1e3a8a); margin:0; padding:20px; }
        .container { max-width: 1450px; margin:auto; background:white; border-radius:20px; box-shadow:0 20px 50px rgba(0,0,0,0.35); overflow:hidden; }
        header { background: linear-gradient(to right, #1e40af, #60a5fa); color:white; padding:40px 20px; text-align:center; }
        h1 { margin:0; font-size:3em; letter-spacing: -1px; }
        .subtitle { opacity: 0.95; margin-top: 8px; font-size: 1.2em; }
        .content { padding: 35px; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:18px 12px; text-align:left; border-bottom:1px solid #e2e8f0; }
        th { background:#f8fafc; font-weight:600; }
        .profit { font-weight:bold; color:#22c55e; font-size:1.15em; }
        a { color:#3b82f6; text-decoration:none; font-weight:500; }
        a:hover { text-decoration:underline; }
        tr:hover { background:#f0f9ff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔫 DealPrism</h1>
            <p class="subtitle">Argos Top Deals • Smart Resale Profit Finder</p>
        </header>
        <div class="content">
            {{ results|safe }}
        </div>
    </div>
</body>
</html>
