<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DealPrism - UK Deals</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
        h1 { color: #1a73e8; }
        input { padding: 12px; width: 500px; font-size: 18px; }
        button { padding: 12px 24px; font-size: 18px; background: #1a73e8; color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        .price { font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>
    <h1>🔍 DealPrism - UK Price Finder</h1>
    
    <form method="post">
        <input type="text" name="query" value="{{ query }}" placeholder="Search for anything (e.g. headphones, laptop, ps5)">
        <button type="submit">🔎 Search Deals</button>
    </form>

    {% if results %}
        <h2>Results for "{{ query }}"</h2>
        {{ results|safe }}
    {% endif %}
</body>
</html>
