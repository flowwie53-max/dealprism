<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealPrism 🔫</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1e3a8a, #3b82f6); margin:0; padding:40px; color:white; text-align:center; }
        .card { background:white; color:#1e3a8a; max-width:900px; margin:40px auto; padding:50px; border-radius:20px; box-shadow:0 15px 40px rgba(0,0,0,0.4); }
        h1 { font-size:3em; margin:0 0 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔫 DealPrism</h1>
        <p style="font-size:1.5em;">Argos Top Deals • Resale Profit Finder</p>
        {{ results|safe }}
    </div>
</body>
</html>
