<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealPrism 🔫</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #0f172a, #1e40af); margin:0; padding:20px; color:#e2e8f0; }
        .container { max-width: 1300px; margin:auto; background:white; border-radius:20px; box-shadow:0 20px 50px rgba(0,0,0,0.5); overflow:hidden; color:#1e2937; }
        header { background: linear-gradient(to right, #1e40af, #3b82f6); color:white; padding:40px; text-align:center; }
        h1 { margin:0; font-size:3em; }
        .subtitle { font-size:1.3em; opacity:0.95; }
        .content { padding:35px; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:18px; text-align:left; border-bottom:1px solid #e2e8f0; }
        th { background:#f1f5f9; }
        .profit { font-weight:bold; color:#22c55e; font-size:1.2em; }
        a { color:#2563eb; font-weight:bold; }
        tr:hover { background:#f0f9ff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔫 DealPrism</h1>
            <p class="subtitle">Argos Top Deals • Smart Resale Profit Finder</p>
        </header>
        <div class="content">
            {{ results|safe }}
        </div>
    </div>
</body>
</html>
